name: Version Check

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to use for expected versions"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - staging
          - production
  pull_request:
  push:
    branches:
      - main

jobs:
  check-frontend-backend-versions:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    env:
      EXPECTED_FRONTEND_VERSION: ${{ vars.FRONTEND_VERSION }}
      EXPECTED_BACKEND_VERSION: ${{ vars.BACKEND_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify frontend and backend versions
        run: |
          node -e "
          const fs = require('fs');
          const frontend = JSON.parse(fs.readFileSync('slf-frontend/package.json', 'utf8')).version;
          const backend = JSON.parse(fs.readFileSync('slf-backend/package.json', 'utf8')).version;
          const expectedFrontend = process.env.EXPECTED_FRONTEND_VERSION;
          const expectedBackend = process.env.EXPECTED_BACKEND_VERSION;
 
          if (!expectedFrontend || !expectedBackend) {
            console.warn('FRONTEND_VERSION and/or BACKEND_VERSION are not set for this environment. Comparison skipped.');
            console.log('Detected versions -> frontend:', frontend, '| backend:', backend);
            process.exit(0);
          }

          if (frontend !== expectedFrontend) {
            console.error('Frontend version mismatch:', { expected: expectedFrontend, actual: frontend });
            process.exit(1);
          }

          if (backend !== expectedBackend) {
            console.error('Backend version mismatch:', { expected: expectedBackend, actual: backend });
            process.exit(1);
          }

          console.log('Version check passed.');
          console.log('frontend:', frontend);
          console.log('backend:', backend);
          "

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slf-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: slf-frontend
        run: npm ci

      - name: Test frontend
        working-directory: slf-frontend
        run: npm run ci

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slf-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: slf-backend
        run: npm ci

      - name: Test backend
        working-directory: slf-backend
        run: npm run test
