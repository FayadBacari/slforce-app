services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./slf-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5132:5132"
    env_file:
      - .env.docker
    environment:
      MONGODB_URI: mongodb://mongo:27017/slforce
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: ./slf-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
